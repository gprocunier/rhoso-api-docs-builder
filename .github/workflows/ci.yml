name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Regenerate validation artifacts
        run: rhoso-api-docs-builder build --rhoso-version 18.0 --clean
      - name: Validate generated artifacts
        run: rhoso-api-docs-builder validate --rhoso-version 18.0
      - name: Check generated artifacts are current
        run: git diff --exit-code validation site
